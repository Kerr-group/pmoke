name: Performance

on:
  workflow_dispatch:
    inputs:
      samples:
        description: Number of samples in the synthetic workload
        required: false
        default: "1000000"
  schedule:
    - cron: "17 3 * * 1"

permissions:
  actions: read
  contents: read

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Synthetic benchmark (${{ matrix.channels }} RAW CSV channels)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channels: [2, 4]
    env:
      PYO3_PYTHON: python

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: matrix.channels == 2
        run: python -m pip install numpy scipy lmfit gsplot

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Select workload size
        id: workload
        env:
          REQUESTED_SAMPLES: ${{ inputs.samples }}
        run: echo "samples=${REQUESTED_SAMPLES:-1000000}" >> "$GITHUB_OUTPUT"

      - name: Build benchmark
        run: cargo bench --locked --no-default-features --bench performance --no-run

      - name: Run benchmark
        run: |
          mkdir -p performance-results
          benchmark="$(find target/release/deps -maxdepth 1 -type f -name 'performance-*' -perm -111 | head -n 1)"
          test -n "$benchmark"
          if [ "${{ matrix.channels }}" = "2" ]; then
            cases=(raw_word_decode raw_waveform_read sensor_integral lockin_w1 lockin_w2 python_copy raw_to_csv analysis_pipeline plot_decimate_stride plot_decimate_min_max)
          else
            cases=(raw_waveform_read raw_to_csv)
          fi
          overall_status=0
          for case_name in "${cases[@]}"; do
            set +e
            /usr/bin/time -v -o "performance-results/resources-${case_name}.txt" \
              "$benchmark" --bench \
                --case "$case_name" \
                --samples "${{ steps.workload.outputs.samples }}" \
                --channels "${{ matrix.channels }}" \
                --output "performance-results/results-${case_name}.json" \
                > "performance-results/output-${case_name}.log" 2>&1
            case_status=$?
            set -e
            echo "$case_status" > "performance-results/status-${case_name}.txt"
            if [ "$case_status" -ne 0 ]; then
              overall_status=1
            fi
          done
          exit "$overall_status"

      - name: Record environment
        if: always()
        run: |
          mkdir -p performance-results
          {
            uname -a
            python --version
            python -m pip freeze
            rustc --version --verbose
            lscpu
          } > performance-results/environment.txt

      - name: Compare with previous successful run
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous-performance
          list_error="$(mktemp)"
          set +e
          previous_run="$(
            gh run list \
              --workflow performance.yml \
              --branch "$GITHUB_REF_NAME" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId' 2>"$list_error"
          )"
          list_status=$?
          set -e
          if [ "$list_status" -ne 0 ]; then
            echo "::warning title=Previous performance run unavailable::gh run list failed with status $list_status"
            sed 's/^/gh: /' "$list_error"
            previous_run=""
          fi
          rm -f "$list_error"
          if [ -n "$previous_run" ]; then
            if ! gh run download "$previous_run" --dir previous-performance; then
              echo "::warning title=Previous performance artifacts unavailable::failed to download artifacts from run $previous_run"
            fi
          fi
          python scripts/compare_performance.py \
            --current performance-results \
            --previous previous-performance \
            --summary "$GITHUB_STEP_SUMMARY"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-${{ matrix.channels }}ch-${{ github.sha }}
          path: performance-results
          if-no-files-found: error
          retention-days: 90
